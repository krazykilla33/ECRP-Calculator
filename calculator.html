<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ECRP Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section class="card">
      <div class="section-title compact-drug-header">
        <div class="drug-header-left">
          <div class="drug-title-line">
            <h2>Product Value Calculator</h2>

            <button id="togglePriceListBtn" class="secondary small-button" type="button">
              Price List
            </button>
          </div>

          <div class="ocr-inline-status-row">
            <span id="ocrStatus" class="ocr-status-text">No screenshot</span>
          </div>
        </div>

        <nav class="page-nav drug-header-nav">
          <a class="secondary nav-btn" href="index.html">Lab Tracker</a>
          <a class="secondary nav-btn" href="lab-map.html">Lab Map</a>
        </nav>

        <div class="drug-header-tools">
          <div id="ocrPasteBox" class="ocr-paste-box compact-paste-box" tabindex="0">
            Paste Screenshot
          </div>

          <label class="toggle bonus-toggle">
            <input id="bonusEnabled" type="checkbox" /> Enable bonus
          </label>

          <button id="scanScreenshotBtn" class="secondary small-button" type="button">
            Scan
          </button>

          <button id="resetBtn" class="secondary small-button product-reset-btn" type="button">
            Reset Calculator
          </button>

          <button id="applyOcrBtn" class="secondary small-button apply-btn" type="button">
            Apply
          </button>
        </div>
      </div>

      <div id="ocrPreview" class="ocr-preview hidden"></div>

      <div id="priceListPanel" class="price-list-panel hidden">
        <div class="breakdown-title-row">
          <h3>Price List</h3>
          <span>Values used by the calculator</span>
        </div>

        <div id="priceListTable" class="price-list-table"></div>
      </div>

      <div id="quantityGrid" class="table-wrap"></div>

      <div class="product-dashboard">
        <div class="dashboard-card totals-card">
          <div class="dashboard-card-title">
            <h3>Totals</h3>
          </div>

          <div class="summary-grid dashboard-summary-grid">
            <div class="summary">
              <span>Grand Total</span>
              <strong id="grandTotal">$0</strong>
            </div>

            <div class="summary">
              <span>Total With Bonus</span>
              <strong id="totalWithBonus">$0</strong>
            </div>

            <div class="summary">
              <span>Bonus Total</span>
              <strong id="bonusTotal">$0</strong>
            </div>
          </div>
        </div>

        <div class="dashboard-card quantity-dashboard-card">
          <div class="breakdown-title-row">
            <h3>Detailed Quantity Breakdown</h3>
            <span>Total quantity by product</span>
          </div>

          <div id="quantityBreakdown" class="quantity-breakdown-grid dashboard-breakdown-grid"></div>
        </div>

        <div id="productBreakdown" class="dashboard-card value-dashboard-card"></div>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
