<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ECRP Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <h1>ECRP Drug Calculator</h1>
      <p>Product values, bonuses, and quantity breakdowns.</p>
    </div>

    <nav class="page-nav">
      <a class="secondary nav-btn" href="index.html">Lab Tracker</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <div class="section-title product-title-row">
        <h2>Product Value Calculator</h2>

        <div class="product-tools-row">
          <div id="ocrPasteBox" class="ocr-paste-box compact-paste-box" tabindex="0">
            Paste Screenshot
          </div>

          <button id="scanScreenshotBtn" class="secondary small-button" type="button">Scan</button>
          <button id="applyOcrBtn" class="secondary small-button" type="button">Apply</button>

          <button id="resetBtn" class="secondary small-button product-reset-btn" type="button">
            Reset Calculator
          </button>
        </div>

        <label class="toggle">
          <input id="bonusEnabled" type="checkbox" /> Enable bonus
        </label>
      </div>

      <div class="ocr-inline-status-row">
        <span id="ocrStatus" class="ocr-status-text">No screenshot</span>
      </div>

      <div id="ocrPreview" class="ocr-preview hidden"></div>

      <div id="quantityGrid" class="table-wrap"></div>

      <div class="summary-grid">
        <div class="summary"><span>Grand Total</span><strong id="grandTotal">$0</strong></div>
        <div class="summary"><span>Total With Bonus</span><strong id="totalWithBonus">$0</strong></div>
        <div class="summary"><span>Bonus Total</span><strong id="bonusTotal">$0</strong></div>
      </div>

      <div class="quantity-breakdown-card">
        <div class="breakdown-title-row">
          <h3>Detailed Quantity Breakdown</h3>
          <span>Total quantity by product</span>
        </div>
        <div id="quantityBreakdown" class="quantity-breakdown-grid"></div>
      </div>

      <div id="productBreakdown" class="quantity-breakdown-card"></div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
